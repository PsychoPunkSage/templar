name: Build & Push TeX Live Base Image

on:
  push:
    branches: [main]
    paths:
      - 'infra/Dockerfile.texlive-base'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: infra
          file: infra/Dockerfile.texlive-base
          push: true
          tags: |
            ghcr.io/psychopunksage/templar-texlive-base:latest
            ghcr.io/psychopunksage/templar-texlive-base:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
